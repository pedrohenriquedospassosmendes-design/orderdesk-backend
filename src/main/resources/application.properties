spring.application.name=orderdesk-backend
server.port=${PORT:8080}
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# Perfil local/teste: H2 com nome fixo. Nao troca este nome se quiser manter os dados locais.
spring.datasource.url=jdbc:h2:file:./data/orderdesk-v56-stable-db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=SA
spring.datasource.password=

# Mantem os dados existentes e apenas atualiza o esquema quando necessario.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# No local/teste, o H2 pode ter sido criado por versoes antigas do Hibernate.
# Por isso o Flyway fica desligado por padrao no local para nao travar bancos antigos.
# Em producao, application-prod.properties liga o Flyway.
spring.flyway.enabled=${FLYWAY_ENABLED:false}
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.validate-on-migrate=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true
